<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Editor</title>
    <link rel="stylesheet" href="./src/app.css">
</head>
<body>

<input type="file" id="file-inp" accept=".md,.markdown,.txt,.mdx" multiple>
<div id="dov">
    <div class="dt">Drop files here</div>
    <div class="ds">.md · .markdown · .txt · .mdx</div>
</div>

<div id="tst"></div>

<!-- Titlebar -->
<div id="bar">
  <svg class="logo" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
  <span class="appname">MD Editor</span>
  <div class="sep"></div>
  <span id="fname">No file open</span>
  <span id="dirty">●</span>
  <div class="sp"></div>
  <div class="vt">
    <button class="vtb" id="vt-edit">Edit</button>
    <button class="vtb on" id="vt-split">Split</button>
    <button class="vtb" id="vt-preview">Preview</button>
  </div>
  <button id="btn-sidebar" title="Toggle Sidebar (Ctrl+B)">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12"/>
    </svg>
  </button>
  <div class="sep"></div>

  <button class="btn" id="btn-open">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
    Open
  </button>

  <button class="btn" id="btn-save">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 3.75V16.5L12 21m0 0L7.5 16.5V3.75m0 0h9M12 21V3.75"/></svg>
    Save
  </button>

  <button class="btn" id="btn-saveas">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 3.75V16.5L12 21m0 0L7.5 16.5V3.75m0 0h9M12 21V3.75"/></svg>
    Save As
  </button>

  <button class="btn pri" id="btn-new">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
    New
  </button>

</div>

<!-- Workspace -->
<div id="ws">
  <!-- Sidebar -->
  <div id="sb">
    <div class="sbh">
      <span>Files</span>
      <button class="ib" id="sb-open" title="Open files">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </button>
    </div>

    <div id="flist"></div>
  </div>

  <!-- Editor pane -->
  <div id="ep">
    <!-- Format toolbar -->
    <div id="ftb">
      <button class="fb" id="f-bold" title="Bold Ctrl+B">
        <b>B</b>
      </button>
      <button class="fb" id="f-italic" title="Italic Ctrl+I">
        <i>I</i>
      </button>
      <button class="fb" id="f-strike" title="Strikethrough">
        <s>S</s>
      </button>
      <button class="fb" id="f-code" title="Inline code">`c`</button>
      <div class="fs"></div>
      <button class="fb" id="f-h1">H1</button>
      <button class="fb" id="f-h2">H2</button>
      <button class="fb" id="f-h3">H3</button>
      <div class="fs"></div>
      <button class="fb" id="f-ul" title="Bullet list">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.008v.008H3.75V6.75zm0 5.25h.008v.008H3.75V12zm0 5.25h.008v.008H3.75v-.008z"/></svg>
      </button>
      <button class="fb" id="f-ol" title="Numbered list">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.75v.75h-.75V6.75zm0 5.25h.75v.75h-.75V12zm0 5.25h.75v.75h-.75v-.75z"/></svg>
      </button>
      <button class="fb" id="f-task" title="Task list">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.75v.75h-.75V6.75zm0 5.25h.75v.75h-.75V12zm0 5.25h.75v.75h-.75v-.75z"/></svg>
      </button>
      <button class="fb" id="f-quote" title="Blockquote">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18"/></svg>
      </button>
      <button class="fb" id="f-cb" title="Code block">```</button>
      <div class="fs"></div>
      <button class="fb" id="f-link" title="Link">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
      </button>
      <button class="fb" id="f-hr" title="Horizontal rule">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5"/></svg>
      </button>
      <button class="fb" id="f-table" title="Table">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 01-1.125-1.125M3.375 19.5h1.5C5.496 19.5 6 18.996 6 18.375m-3.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-1.5A1.125 1.125 0 0118 18.375M20.625 4.5H3.375m17.25 0c.621 0 1.125.504 1.125 1.125M20.625 4.5h-1.5C18.504 4.5 18 5.004 18 5.625m3.75 0v1.5c0 .621-.504 1.125-1.125 1.125M3.375 4.5c-.621 0-1.125.504-1.125 1.125M3.375 4.5h1.5C5.496 4.5 6 5.004 6 5.625m-3.75 0v1.5c0 .621.504 1.125 1.125 1.125m0 0h1.5m-1.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m1.5-3.75C5.496 8.25 6 7.746 6 7.125v-1.5M4.875 8.25C5.496 8.25 6 8.754 6 9.375v1.5m0-5.25v5.25m0-5.25C6 5.004 5.496 4.5 4.875 4.5M18 5.625v5.25M18 5.625c0-.621.504-1.125 1.125-1.125M18 5.625v1.5c0 .621-.504 1.125-1.125 1.125M18 10.875v1.5c0 .621.504 1.125 1.125 1.125M18 10.875c0 .621-.504 1.125-1.125 1.125m1.125-1.125c.621 0 1.125.504 1.125 1.125m-1.125-1.125v-1.5c0-.621.504-1.125 1.125-1.125M19.125 10.875c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-12-5.25v5.25m0-5.25c0-.621-.504-1.125-1.125-1.125M6 5.625v1.5c0 .621.504 1.125 1.125 1.125M6 10.875v1.5c0 .621.504 1.125 1.125 1.125M6 10.875c0 .621-.504 1.125-1.125 1.125m1.125-1.125c.621 0 1.125.504 1.125 1.125m-1.125-1.125v-1.5c0-.621.504-1.125 1.125-1.125M7.125 10.875c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125"/></svg>
      </button>
      <div class="fs" style="margin-left:auto"></div>
      <button class="fb" id="f-find" style="font-family:var(--ui)">Find</button>
    </div>

    <!-- Search -->
    <div id="srch">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="si" type="text" placeholder="Find in document… (Enter = next, Shift+Enter = prev)">
      <span id="sc"></span>
      <button class="ib" id="srch-close">✕</button>
    </div>

    <!-- Content -->
    <div id="ca">
      <!-- Empty state -->
      <div id="emp">
        <svg width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1" style="opacity:.25"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
        <div class="et">No file open</div>
        <div class="es">Open a .md file, create a new one, or drag and drop files onto this window.</div>
        <button class="eb" id="emp-open">Open file…</button>
      </div>

      <!-- Editor -->
      <div id="ew">
        <div id="ln"></div>
        <textarea id="ed" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="Write Markdown here…"></textarea>
      </div>

      <div id="rz"></div>

      <!-- Preview -->
      <div id="pw"><div id="pv"></div></div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div id="stb">
  <span id="sb-mode">No file</span>
  <div class="sr">
    <span id="sb-w">0 words</span>
    <span id="sb-l">0 lines</span>
    <span id="sb-p">Ln 1, Col 1</span>
    <span>Markdown</span>
  </div>
</div>


<script src="./src/main.js" type="module"></script>
<script src="/wailsjs/runtime/runtime.js"></script>
</body>
</html>
