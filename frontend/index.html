<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markit</title>
  <link rel="stylesheet" href="./src/app.css">
</head>
<body>

<input type="file" id="file-inp" accept=".md,.markdown,.txt,.mdx" multiple>

<div id="dov">
  <div class="dt">Drop files here</div>
  <div class="ds">.md · .markdown · .txt · .mdx</div>
</div>

<div id="tst"></div>

<!-- Titlebar -->
<div id="bar">
  <button id="btn-sidebar" title="Toggle Sidebar (Ctrl+B)">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12"/>
    </svg>
  </button>
  <span id="fname">No file open</span>
  <span id="dirty">●</span>
  <div class="sp"></div>

  <div class="vt">
    <button class="vtb" id="vt-edit" title="Edit mode">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/>
      </svg>
    </button>
    <button class="vtb on" id="vt-split" title="Split view">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
      </svg>
    </button>
    <button class="vtb" id="vt-preview" title="Preview mode">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </button>
  </div>

  <div class="sep"></div>

  <button class="btn" id="btn-save" title="Save">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 3.75V16.5L12 21m0 0L7.5 16.5V3.75m0 0h9M12 21V3.75"/>
    </svg>
  </button>
  <button class="btn" id="btn-saveas" title="Save As">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5v10.5A2.25 2.25 0 005.25 20h13.5A2.25 2.25 0 0021 17.75V8.25A2.25 2.25 0 0018.75 6H6.108l-1.714-1.714A2.25 2.25 0 003.19 3.75H2.25"/>
    </svg>
  </button>
  <div class="sep"></div>

  <button class="btn" id="btn-zoom-out" title="Zoom out">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607zM13.5 10.5h-6"/>
    </svg>
  </button>
  <button class="btn" id="btn-zoom-in" title="Zoom in">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607zM10.5 7.5v6m3-3h-6"/>
    </svg>
  </button>
</div>

<!-- Workspace -->
<div id="ws">
  <!-- Sidebar -->
  <div id="sb">
    <div class="sbh">
        
      <span>Files</span>
      <button class="ib" id="sb-open" title="Open files">
        <!-- <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg> -->
      </button>
      <button class="ib"  id="btn-open" title="Open file">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
      </button>
      <button class="ib" id="btn-new" title="New file">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
      </button>
    </div>

    <div id="flist"></div>

    <!-- Resize handle -->
    <div id="outline-resize" class="resize-h"></div>

    <!-- Document Outline -->
    <div class="sbh" style="margin-top: 1px; padding-top: 16px; border-top: 1px solid var(--border)">
      <span>Outline</span>
      <button class="ib" id="outline-toggle" title="Toggle outline">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.008v.008H3.75V6.75zm0 5.25h.008v.008H3.75V12zm0 5.25h.008v.008H3.75v-.008z"/>
        </svg>
      </button>
    </div>

    <div id="outline"></div>
  </div>

  <!-- Editor pane -->
  <div id="ep">
    <!-- Format toolbar -->
    <div id="ftb">
      <button class="fb" id="f-bold" title="Bold Ctrl+B"><b>B</b></button>
      <button class="fb" id="f-italic" title="Italic Ctrl+I"><i>I</i></button>
      <button class="fb" id="f-strike" title="Strikethrough"><s>S</s></button>
      <button class="fb" id="f-code" title="Inline code">`c`</button>

      <div class="fs"></div>

      <button class="fb" id="f-h1" title="Heading 1">H1</button>
      <button class="fb" id="f-h2" title="Heading 2">H2</button>
      <button class="fb" id="f-h3" title="Heading 3">H3</button>

      <div class="fs"></div>

      <button class="fb" id="f-ul" title="Bullet list">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.008v.008H3.75V6.75zm0 5.25h.008v.008H3.75V12zm0 5.25h.008v.008H3.75v-.008z"/>
        </svg>
      </button>
      <button class="fb" id="f-ol" title="Numbered list">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.75v.75h-.75V6.75zm0 5.25h.75v.75h-.75V12zm0 5.25h.75v.75h-.75v-.75z"/>
        </svg>
      </button>
      <button class="fb" id="f-task" title="Task list">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.75v.75h-.75V6.75zm0 5.25h.75v.75h-.75V12zm0 5.25h.75v.75h-.75v-.75z"/>
        </svg>
      </button>
      <button class="fb" id="f-quote" title="Blockquote">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18"/>
        </svg>
      </button>
      <button class="fb" id="f-cb" title="Code block">```</button>

      <div class="fs"></div>

      <button class="fb" id="f-link" title="Link">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m13.35-.622l1.757-1.757a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/>
        </svg>
      </button>
      <button class="fb" id="f-hr" title="Horizontal rule">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5"/>
        </svg>
      </button>
      <button class="fb" id="f-table" title="Table">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 01-1.125-1.125M3.375 19.5h1.5C5.496 19.5 6 18.996 6 18.375m-3.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-1.5A1.125 1.125 0 0118 18.375M20.625 4.5H3.375m17.25 0c.621 0 1.125.504 1.125 1.125M20.625 4.5h-1.5C18.504 4.5 18 5.004 18 5.625m3.75 0v1.5c0 .621-.504 1.125-1.125 1.125M3.375 4.5c-.621 0-1.125.504-1.125 1.125M3.375 4.5h1.5C5.496 4.5 6 5.004 6 5.625m-3.75 0v1.5c0 .621.504 1.125 1.125 1.125m0 0h1.5m-1.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m1.5-3.75C5.496 8.25 6 7.746 6 7.125v-1.5M4.875 8.25C5.496 8.25 6 8.754 6 9.375v1.5m0-5.25v5.25m0-5.25C6 5.004 5.496 4.5 4.875 4.5M18 5.625v5.25M18 5.625c0-.621.504-1.125 1.125-1.125M18 5.625v1.5c0 .621-.504 1.125-1.125 1.125M18 10.875v1.5c0 .621.504 1.125 1.125 1.125M18 10.875c0 .621-.504 1.125-1.125 1.125m1.125-1.125c.621 0 1.125.504 1.125 1.125m-1.125-1.125v-1.5c0-.621.504-1.125 1.125-1.125M19.125 10.875c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-12-5.25v5.25m0-5.25c0-.621-.504-1.125-1.125-1.125M6 5.625v1.5c0 .621.504 1.125 1.125 1.125M6 10.875v1.5c0 .621.504 1.125 1.125 1.125M6 10.875c0 .621-.504 1.125-1.125 1.125m1.125-1.125c.621 0 1.125.504 1.125 1.125m-1.125-1.125v-1.5c0-.621.504-1.125 1.125-1.125M7.125 10.875c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125"/>
        </svg>
      </button>

      <div class="fs" style="margin-left:auto"></div>
      <button class="fb" id="f-find" title="Find in document" style="font-family:var(--ui)">Find</button>
    </div>

    <!-- Search -->
    <div id="srch">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--text3);flex-shrink:0">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="si" type="text" placeholder="Find in document… (Enter = next, Shift+Enter = prev)">
      <span id="sc"></span>
      <button class="ib" id="srch-close">✕</button>
    </div>

    <!-- File changed notification bar -->
    <div id="notif">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--orange)">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
    </svg>
    <span id="notif-msg">File was modified outside this editor.</span>
    <div style="flex:1"></div>
    <button class="notif-btn" id="notif-reload">Reload</button>
    <button class="notif-btn" id="notif-keep">Keep mine</button>
    <button class="notif-btn notif-save" id="notif-save">Save mine</button>
    <button class="notif-close" id="notif-close">✕</button>
    </div>

    <!-- Content -->
    <div id="ca">
      <!-- Empty state -->
      <div id="emp">
        <svg width="56" height="56" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1" style="opacity:.25">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
        <div class="et">No file open</div>
        <div class="es">Open a .md file, create a new one, or drag and drop files onto this window.</div>
        <button class="eb" id="emp-open">Open file…</button>
      </div>

      <!-- Editor -->
      <div id="ew">
        <div id="ln"></div>
        <textarea id="ed" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="Write Markdown here…"></textarea>
      </div>

      <div id="rz"></div>

      <!-- Preview -->
      <div id="pw"><div id="pv"></div></div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div id="stb">
  <span id="sb-mode">No file</span>
  <div class="sr">
    <span id="sb-w">0 words</span>
    <span id="sb-l">0 lines</span>
    <span id="sb-p">Ln 1, Col 1</span>
    <span>Markdown</span>
  </div>
</div>

<script src="./src/main.js" type="module"></script>
<script src="/wailsjs/runtime/runtime.js"></script>
</body>
</html>
